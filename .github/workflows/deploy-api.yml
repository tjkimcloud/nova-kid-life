name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy ${{ matrix.service }} Lambda
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            function: novakidlife-prod-api
          - service: events-scraper
            function: novakidlife-prod-events-scraper
          # image-gen excluded: google-cloud-aiplatform pushes unzipped size >250MB
          # (Lambda hard limit). Deploy manually: python scripts/deploy-lambdas.py image-gen
          - service: content-generator
            function: novakidlife-prod-content-generator
          - service: quality-agent
            function: novakidlife-prod-quality-agent
          # social-poster excluded — Lambda not deployed (pending Ayrshare setup)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Package Lambda
        working-directory: services/${{ matrix.service }}
        run: |
          mkdir -p .pkg
          pip install -r requirements.txt -t .pkg/ -q \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.12 \
            --only-binary=:all:
          rsync -a \
            --exclude='.pkg/' \
            --exclude='tests/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.venv/' \
            --exclude='*.md' \
            --exclude='package.json' \
            --exclude='*.sh' \
            . .pkg/
          cd .pkg && zip -r9 ../function.zip . && cd ..
          echo "Package size: $(du -sh function.zip | cut -f1)"

      - name: Deploy to Lambda
        working-directory: services/${{ matrix.service }}
        run: |
          SIZE=$(stat -c%s function.zip)
          if [ "$SIZE" -gt 52428800 ]; then
            echo "Package > 50MB ($SIZE bytes) — deploying via S3"
            aws s3 cp function.zip s3://novakidlife-tfstate/lambda-deploys/${{ matrix.service }}/deploy.zip
            aws lambda update-function-code \
              --function-name ${{ matrix.function }} \
              --s3-bucket novakidlife-tfstate \
              --s3-key lambda-deploys/${{ matrix.service }}/deploy.zip \
              --no-cli-pager
          else
            aws lambda update-function-code \
              --function-name ${{ matrix.function }} \
              --zip-file fileb://function.zip \
              --no-cli-pager
          fi

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ matrix.function }}

      - name: Verify deployment
        run: |
          VERSION=$(aws lambda get-function-configuration \
            --function-name ${{ matrix.function }} \
            --query 'LastModified' \
            --output text)
          echo "### ${{ matrix.function }} deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Last modified:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
