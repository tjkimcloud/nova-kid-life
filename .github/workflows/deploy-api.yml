name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    name: Deploy ${{ matrix.service }} Lambda
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            function: novakidlife-api
          - service: events-scraper
            function: novakidlife-events-scraper
          - service: image-gen
            function: novakidlife-image-gen
          # Uncomment when Session 8 (social-poster) is complete:
          # - service: social-poster
          #   function: novakidlife-social-poster

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Package Lambda
        working-directory: services/${{ matrix.service }}
        run: |
          mkdir -p .pkg
          pip install -r requirements.txt -t .pkg/ -q
          rsync -a \
            --exclude='.pkg/' \
            --exclude='tests/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.venv/' \
            --exclude='*.md' \
            --exclude='package.json' \
            --exclude='*.sh' \
            . .pkg/
          cd .pkg && zip -r9 ../function.zip . && cd ..
          echo "Package size: $(du -sh function.zip | cut -f1)"

      - name: Deploy to Lambda
        working-directory: services/${{ matrix.service }}
        run: |
          aws lambda update-function-code \
            --function-name ${{ matrix.function }} \
            --zip-file fileb://function.zip \
            --no-cli-pager

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ matrix.function }}

      - name: Verify deployment
        run: |
          VERSION=$(aws lambda get-function-configuration \
            --function-name ${{ matrix.function }} \
            --query 'LastModified' \
            --output text)
          echo "### ${{ matrix.function }} deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Last modified:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
