name: Daily QA Orchestrator

on:
  schedule:
    # 9:00 AM EST (14:00 UTC) — after scraper (6am) and rebuild (7:30am)
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'QA mode: fast or full'
        required: false
        default: 'full'

# Only one QA run at a time — new run waits instead of canceling previous
concurrency:
  group: qa-orchestrator
  cancel-in-progress: false

jobs:
  qa-orchestrate:
    name: QA Orchestrator
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Step 1: Run orchestrator ─────────────────────────────────────────────
      # The orchestrator:
      #  1. Runs full QA audit
      #  2. Auto-archives past/expired events via Supabase (if data issues found)
      #  3. Re-runs QA to verify fixes
      #  4. Opens/updates a GitHub issue for anything needing human attention
      #  5. Closes the issue if everything is clean
      - name: Run QA Orchestrator
        id: orchestrate
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ "$MODE" = "fast" ]; then
            node scripts/qa-site.js --fast 2>&1 | tee qa-output.txt
            EXIT_CODE=${PIPESTATUS[0]}
          else
            node scripts/qa-orchestrate.js 2>&1 | tee qa-output.txt
            EXIT_CODE=${PIPESTATUS[0]}
          fi
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:          ${{ github.repository }}
          RUN_URL:              ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        continue-on-error: true

      # ── Step 2: Parse summary stats for job summary ──────────────────────────
      - name: Parse result counts
        id: parse
        if: always()
        run: |
          FAILURES=$(grep -c "^  ❌" qa-output.txt 2>/dev/null || echo 0)
          WARNINGS=$(grep -c "^  ⚠️" qa-output.txt 2>/dev/null || echo 0)
          echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT

      # ── Step 3: Upload full report as artifact ───────────────────────────────
      - name: Upload QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report-${{ github.run_id }}
          path: qa-output.txt
          retention-days: 30

      # ── Step 4: Write GitHub Actions job summary ─────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## QA Orchestrator — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failures | ${{ steps.parse.outputs.failures }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚠️ Warnings | ${{ steps.parse.outputs.warnings }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat qa-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      # ── Step 5: Fail job if QA failed (for red badge visibility) ────────────
      - name: Fail if QA failed
        if: steps.orchestrate.outputs.exit_code != '0'
        run: exit 1
