name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
  workflow_dispatch:
  schedule:
    # Rebuild at 7:30am EST (12:30 UTC) — 90 min after scraper runs at 6am
    - cron: '30 12 * * *'
    # Second rebuild at 3pm EST (20:00 UTC) — catches afternoon submissions
    - cron: '0 20 * * *'

jobs:
  deploy:
    name: Build & Deploy to S3
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download self-hosted fonts
        working-directory: apps/web
        run: node scripts/download-fonts.mjs

      - name: Build static export
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync HTML files (no-cache)
        run: |
          aws s3 sync apps/web/out/ s3://${{ secrets.WEB_BUCKET_NAME }} \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --include "*.txt" \
            --include "*.xml" \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Sync static assets (1-year cache)
        run: |
          aws s3 sync apps/web/out/ s3://${{ secrets.WEB_BUCKET_NAME }} \
            --exclude "*.html" \
            --exclude "*.txt" \
            --exclude "*.xml" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "### Frontend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Bucket:** ${{ secrets.WEB_BUCKET_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ secrets.NEXT_PUBLIC_SITE_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      # P0-B: Run fast QA immediately after deploy to catch regressions within minutes
      # CloudFront invalidation takes ~30s to propagate — wait before checking
      - name: Wait for CloudFront propagation
        run: sleep 45

      - name: Post-deploy QA check
        id: post_deploy_qa
        run: node scripts/qa-site.js --fast 2>&1 | tee post-deploy-qa.txt
        continue-on-error: true

      - name: QA summary
        if: always()
        run: |
          echo "### Post-Deploy QA" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -10 post-deploy-qa.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Fail if post-deploy QA failed
        if: steps.post_deploy_qa.outcome == 'failure'
        run: |
          echo "❌ Post-deploy QA failed — site may be broken. Check the QA output above."
          exit 1
