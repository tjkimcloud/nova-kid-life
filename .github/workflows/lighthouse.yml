name: Lighthouse CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/lighthouse.yml'

jobs:
  lighthouse:
    name: Lighthouse Audit (90+ required)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download self-hosted fonts
        working-directory: apps/web
        run: node scripts/download-fonts.mjs

      - name: Build static export
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.novakidlife.com' }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://novakidlife.com' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Install Lighthouse CI and serve
        run: npm install -g @lhci/cli serve

      - name: Write Lighthouse CI config
        run: |
          cat > .lighthouserc.json << 'EOF'
          {
            "ci": {
              "collect": {
                "startServerCommand": "serve apps/web/out -p 3000",
                "startServerReadyPattern": "Accepting connections",
                "startServerReadyTimeout": 10000,
                "url": [
                  "http://localhost:3000/",
                  "http://localhost:3000/events/"
                ],
                "numberOfRuns": 1,
                "settings": {
                  "chromeFlags": "--no-sandbox"
                }
              },
              "assert": {
                "assertions": {
                  "categories:performance": ["error", {"minScore": 0.9}],
                  "categories:accessibility": ["error", {"minScore": 0.9}],
                  "categories:best-practices": ["error", {"minScore": 0.9}],
                  "categories:seo": ["error", {"minScore": 0.9}]
                }
              },
              "upload": {
                "target": "temporary-public-storage"
              }
            }
          }
          EOF

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
