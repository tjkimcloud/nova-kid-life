name: Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-python:
    name: Python Tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, events-scraper, image-gen, social-poster, content-generator]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          pip install -r requirements.txt -q
          pip install pytest pytest-cov -q

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check
